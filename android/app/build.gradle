plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    id("com.google.gms.google-services")
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) }
}

// Read .env from Flutter project root
def envProperties = new Properties()
def envFile = rootProject.projectDir.parentFile.toPath().resolve('.env').toFile()
if (envFile.exists()) {
    envFile.readLines('UTF-8').each { line ->
        if (line && !line.startsWith('#') && line.contains('=')) {
            def parts = line.split('=', 2)
            envProperties[parts[0].trim()] = parts[1].trim()
        }
    }
}

android {
    namespace "com.example.face_in"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = '11' // Corrected to a string '11' for jvmTarget
    }

    defaultConfig {
        applicationId = "com.example.face_in"
        minSdkVersion = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        manifestPlaceholders['GOOGLE_MAPS_API_KEY'] = envProperties.getProperty('GOOGLE_MAPS_API_KEY', '')
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }

    // --- ADD THIS BLOCK TO SUPPRESS THE WARNING ---
    lintOptions {
        disable 'ObsoleteSdkInt'
    }
    // --- END OF BLOCK TO ADD ---
}

flutter {
    source = "../.."
}

dependencies {
    // Import the Firebase BoM
    implementation(platform("com.google.firebase:firebase-bom:33.13.0"))

    // TODO: Add the dependencies for Firebase products you want to use
    // When using the BoM, don't specify versions in Firebase dependencies
    implementation("com.google.firebase:firebase-analytics")
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'

    // Add the dependencies for any other desired Firebase products
    // https://firebase.google.com/docs/android/setup#available-libraries
}
