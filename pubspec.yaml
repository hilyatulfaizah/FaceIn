name: face_in
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.8.0
  google_maps_flutter: ^2.12.1
  geolocator: ^14.0.0
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.7
  geocoding: ^3.0.0 # Use geocoding: ^3.0.0 to avoid issues with geolocator_android
  http: ^1.3.0
  image_picker: ^1.1.2
  firebase_auth: ^5.6.0
  google_sign_in: ^6.3.0
  camera: 0.10.5+5 #downgrade to 0.10.5+5 to avoid issues with geolocator_androi
  image: ^3.2.2 #dont change this version, it is required for the camera package to work
  firebase_messaging: ^15.2.7
  firebase_analytics: ^11.5.0
  googleapis_auth: ^2.0.0
  flutter_local_notifications: ^19.3.0
  table_calendar: ^3.2.0
  intl: ^0.20.2
  cloud_functions: ^5.5.2
  google_fonts: ^8.0.2
  firebase_storage: ^12.4.8
  tflite_flutter: ^0.11.0
  lottie: ^3.3.0
  shared_preferences: ^2.5.3
  excel: ^4.0.6
  path_provider: ^2.1.5
  pdf: ^3.8.4
  permission_handler: ^12.0.1
  open_file: ^3.5.10
  share_plus: ^11.0.0
  file_saver: ^0.2.14
  device_info_plus: ^11.3.0
  screen_brightness: ^2.1.5
  syncfusion_flutter_xlsio: ^29.1.38
  flutter_dotenv: ^5.2.1



dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

dependency_overrides:
  geolocator_android: ^4.1.0

flutter:
  uses-material-design: true
  assets:
      - .env
      - assets/models/mobilefacenet_float32.tflite
      - assets/models/blazeface_front.tflite
      - assets/face_frame_ui.jpg
      - assets/map_background.jpg
      - assets/lottie/face_scan_animation.json
      - assets/logo.png
      - assets/NotoSans-Regular.ttf

